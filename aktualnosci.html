  <meta charset="UTF-8">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="pl_PL">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Aktualności – ZS Nr 26 Toruń">
  <meta name="twitter:description" content="Aktualności, ogłoszenia i wydarzenia – Zespół Szkół Nr 26 w Toruniu.">
  <meta name="twitter:image" content="https://szkola26.torun.pl/images/ui/og-image.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>(function(){if(localStorage.getItem('zs26-dark')==='true'){document.body&&document.body.classList.add('dark-mode');}})()</script>
</head>
<body class="antialiased text-gray-800">
  <a href="#main-content" class="skip-link">Przejdź do głównej treści</a>
  <div id="navbar-placeholder"></div>

  <main id="main-content">

    <!-- Nagłówek strony -->
    <section class="py-14 sm:py-20 bg-gray-50 border-b border-gray-100">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <span class="inline-block bg-brand-100 text-brand-700 text-xs font-bold px-3 py-1 rounded-full mb-5 uppercase tracking-wide">Co słychać</span>
        <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-gray-900 mb-4">Aktualności</h1>
        <p class="text-gray-500 max-w-2xl text-base sm:text-lg leading-relaxed">Newsy, ogłoszenia i wydarzenia ze szkoły</p>
      </div>
    </section>

    <!-- Lista aktualności -->
    <section class="py-12 bg-white">
      <div class="max-w-3xl mx-auto px-4 sm:px-6">

        <!-- Filtry -->
        <div class="flex gap-2 flex-wrap mb-8" role="group" aria-label="Filtruj aktualności">
          <button data-filter="wszystkie" aria-pressed="true" class="filter-btn px-4 py-1.5 rounded-full text-sm font-semibold border-2 border-brand-600 transition-colors bg-brand-600 text-white">
            Wszystkie
          </button>
          <button data-filter="ogłoszenie" aria-pressed="false" class="filter-btn px-4 py-1.5 rounded-full text-sm font-semibold border-2 border-brand-600 transition-colors text-brand-600">
            Ogłoszenia
          </button>
          <button data-filter="wydarzenie" aria-pressed="false" class="filter-btn px-4 py-1.5 rounded-full text-sm font-semibold border-2 border-brand-600 transition-colors text-brand-600">
            Wydarzenia
          </button>
          <button data-filter="rekrutacja" aria-pressed="false" class="filter-btn px-4 py-1.5 rounded-full text-sm font-semibold border-2 border-brand-600 transition-colors text-brand-600">
            Rekrutacja
          </button>
        </div>

        <!-- Karty -->
        <div id="news-list" class="space-y-4" aria-live="polite" aria-busy="true"></div>
        <p id="no-results" class="hidden text-center text-gray-500 py-12">Brak aktualności w tej kategorii.</p>

        <!-- Facebook -->
        <div class="mt-10 rounded-2xl p-6 text-center bg-gray-50 border border-gray-200">
          <span class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center mx-auto mb-3">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#1877F2" aria-hidden="true"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
          </span>
          <p class="text-sm text-gray-600 mb-4">Więcej zdjęć i aktualności na bieżąco znajdziesz na naszym Facebooku.</p>
          <a href="https://www.facebook.com/szkola.podstawowa.specjalna.nr26.Torun" target="_blank" rel="noopener noreferrer"
             class="inline-flex items-center gap-2 font-bold text-sm px-5 py-2.5 rounded-full text-white bg-brand-600 hover:bg-brand-700 transition-all">
            <i data-lucide="external-link" class="w-4 h-4"></i>Odwiedź profil
          </a>
        </div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>

  <script src="components/navbar.js?v=1"></script>
  <script src="components/footer.js?v=7"></script>
  <script src="components/a11y.js?v=1"></script>
  <script>
    if(window.lucide) lucide.createIcons({attrs:{'aria-hidden':'true'}});

    const CATEGORY_LABELS = { 'ogłoszenie': 'Ogłoszenie', 'wydarzenie': 'Wydarzenie', 'rekrutacja': 'Rekrutacja' };
    const CATEGORY_COLORS = { 'ogłoszenie': 'badge-ogłoszenie', 'wydarzenie': 'badge-wydarzenie', 'rekrutacja': 'badge-rekrutacja' };

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('pl-PL', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    let allNews = [];
    let activeFilter = 'wszystkie';

    function renderNews(filter) {
      const list = document.getElementById('news-list');
      const noResults = document.getElementById('no-results');
      const items = allNews
        .filter(n => filter === 'wszystkie' || n.category === filter)
        .sort((a, b) => { if (a.pinned !== b.pinned) return a.pinned ? -1 : 1; return new Date(b.date) - new Date(a.date); });

      if (!items.length) { list.innerHTML = ''; noResults.classList.remove('hidden'); return; }
      noResults.classList.add('hidden');
      list.innerHTML = items.map(n => `
        <article class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow${n.pinned ? ' ring-2 ring-brand-200' : ''}">
          ${n.pinned ? `<div class="flex items-center gap-1.5 text-xs font-semibold text-brand-600 mb-3"><i data-lucide="pin" class="w-3.5 h-3.5"></i>Przypięte</div>` : ''}
          <div class="flex items-center gap-2 mb-3 flex-wrap">
            <span class="${CATEGORY_COLORS[n.category] || 'badge-inne'} text-xs font-semibold px-2.5 py-0.5 rounded-full">${CATEGORY_LABELS[n.category] || n.category}</span>
            <time datetime="${n.date}" class="text-xs text-gray-500 ml-auto">${formatDate(n.date)}</time>
          </div>
          <h2 class="text-base font-bold text-gray-900 mb-2">${n.title}</h2>
          <p class="text-gray-500 text-sm leading-relaxed">${n.excerpt}</p>
        </article>`).join('');
      if(window.lucide) lucide.createIcons({attrs:{'aria-hidden':'true'}});
    }

    fetch('data/news.json')
      .then(r => r.json())
      .then(data => {
        allNews = data.posts || [];
        renderNews(activeFilter);
        document.getElementById('news-list').removeAttribute('aria-busy');
      })
      .catch(() => {
        const list = document.getElementById('news-list');
        if (list) { list.removeAttribute('aria-busy'); list.innerHTML = '<p class="text-gray-500 text-sm py-10 text-center">Nie udało się załadować aktualności.</p>'; }
      });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => {
          const active = b.dataset.filter === activeFilter;
          b.classList.toggle('bg-brand-600', active);
          b.classList.toggle('text-white', active);
          b.classList.toggle('text-brand-600', !active);
          b.setAttribute('aria-pressed', String(active));
        });
        renderNews(activeFilter);
      });
    });
  </script>
</body>
</html>
